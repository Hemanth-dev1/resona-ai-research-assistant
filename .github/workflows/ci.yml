name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r research-agent/requirements.txt
          pip install pytest pytest-cov

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 research-agent/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Check Python syntax
        run: |
          python -c "
          import ast, os, glob
          files = glob.glob('research-agent/**/*.py', recursive=True)
          errors = []
          for f in files:
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors:
                  print(f'  {e}')
              exit(1)
          print(f'✅ All {len(files)} Python files parse OK')
          "

      - name: Run tests (mode tests only)
        env:
          PYTHONPATH: research-agent
        run: |
          pytest research-agent/tests/ -v -k "mode" --tb=short 2>&1 | tail -30

      - name: Run full test suite (skips Docker-dependent tests)
        env:
          PYTHONPATH: research-agent
        run: |
          pytest research-agent/tests/ -v --tb=short 2>&1 | tail -30
