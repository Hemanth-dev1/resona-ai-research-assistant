research_task:
  description: >-
    Conduct comprehensive research on the topic: {topic}.
    
    Instructions:
    1. Search the web for the most recent and authoritative information on this topic.
    2. Gather information from at least 5-8 different credible sources.
    3. Extract key facts, statistics, dates, names, and important context.
    4. Note any conflicting viewpoints or controversies.
    5. Identify current trends, challenges, and future outlook.
    6. Organize findings into a structured research brief with source citations.
    
    Your research brief will be used by a technical writer to create a full report.
    Make it comprehensive — the more detail you provide, the better the final report.
  expected_output: >-
    A comprehensive research brief with 5-8 sourced findings, organized by theme or subtopic,
    including key statistics, expert opinions, and source URLs. Minimum 500 words.
  agent: senior_research_analyst

writing_task:
  description: >-
    Using the research brief provided, write a comprehensive, professional report on {topic}.
    
    The report MUST include the following sections in order:
    
    1. **Title Page**: Report title, topic, date, and "Generated by AI Research Agent"
    2. **Executive Summary**: 2-3 paragraph overview of the topic and key findings
    3. **Introduction**: Context and background on why this topic matters
    4. **Detailed Analysis**: 3-5 subsections covering the main aspects of the topic
    5. **Key Insights**: Bullet-pointed key takeaways and findings
    6. **Challenges & Considerations**: Potential issues, controversies, or limitations
    7. **Future Outlook**: Predictions, trends, and what to watch for
    8. **Sources & References**: Numbered list of all sources cited
    
    Format using Markdown headings (##, ###), bullet points, and bold text for emphasis.
    Write in a professional, authoritative tone. Target 1500-2000 words.
  expected_output: >-
    A complete, publication-ready Markdown report with all 8 required sections,
    well-formatted with proper headings, lists, and citations. Minimum 1500 words.
  agent: technical_content_writer
  context:
    - research_task

editing_task:
  description: >-
    Review and polish the draft report on {topic} for quality assurance.
    
    Your responsibilities:
    1. Check for factual accuracy — flag any unsupported claims.
    2. Ensure all required sections are present and well-developed.
    3. Improve clarity, flow, and professional tone.
    4. Fix any formatting issues with Markdown.
    5. Verify that sources are properly cited in the references section.
    6. Add a "Quality Review" note at the end commenting on the report's strengths.
    7. If the report is missing key sections or has significant issues, rewrite those parts.
    
    Maintain the author's original structure and voice while improving quality.
  expected_output: >-
    The final polished report in Markdown format with all sections complete,
    properly formatted, factually sound, and professionally written. Must include
    a Quality Review note at the end. Minimum 1500 words.
  agent: quality_editor
  context:
    - writing_task
