<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resona — AI Research Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace}

/* ── Dark Theme (default) ────────────────────────── */
:root[data-theme="dark"]{
  --bg:#0A0A0A; --bg2:#111111; --bg3:#1A1A1A; --bg4:#222222;
  --surface:#111111; --surface2:#1A1A1A; --border:#222222; --border2:#2A2A2A;
  --text:#E5E5E5; --text2:#999999; --text3:#666666;
  --accent:#6366F1; --accent2:#4F46E5; --accent-glow:rgba(99,102,241,0.15);
  --green:#22C55E; --green-bg:rgba(34,197,94,0.1);
  --yellow:#EAB308; --yellow-bg:rgba(234,179,8,0.1);
  --red:#EF4444; --red-bg:rgba(239,68,68,0.1);
  --purple:#A78BFA; --purple-bg:rgba(167,139,250,0.1);
  --orange:#F97316; --orange-bg:rgba(249,115,22,0.1);
  --shadow:0 1px 3px rgba(0,0,0,.5),0 4px 24px rgba(0,0,0,.3);
  --scrollbar:#333333; --msg-bg:#111111; --msg-border:#222222;
  --input-bg:#111111; --brand:#6366F1;
}

/* ── Light Theme ─────────────────────────────────── */
:root[data-theme="light"]{
  --bg:#F5F5F5; --bg2:#EEEEEE; --bg3:#E8E8E8; --bg4:#DDDDDD;
  --surface:#FFFFFF; --surface2:#FAFAFA; --border:#E0E0E0; --border2:#D0D0D0;
  --text:#1A1A1A; --text2:#666666; --text3:#999999;
  --accent:#6366F1; --accent2:#4F46E5; --accent-glow:rgba(99,102,241,0.12);
  --green:#16A34A; --green-bg:rgba(22,163,74,0.08);
  --yellow:#CA8A04; --yellow-bg:rgba(202,138,4,0.08);
  --red:#DC2626; --red-bg:rgba(220,38,38,0.08);
  --purple:#7C3AED; --purple-bg:rgba(124,58,237,0.08);
  --orange:#EA580C; --orange-bg:rgba(234,88,12,0.08);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 24px rgba(0,0,0,.06);
  --scrollbar:#CCCCCC; --msg-bg:#FFFFFF; --msg-border:#E0E0E0;
  --input-bg:#FFFFFF; --brand:#6366F1;
}

/* Smooth theme transition — only fires when data-theme changes */
[data-theme] *,[data-theme] *::before,[data-theme] *::after{transition:background-color .3s ease,border-color .25s ease,box-shadow .25s ease,color .2s ease}
html{font-size:15px;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Page Load Animations ────────────────────────── */
@keyframes pageFadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.app{animation:pageFadeIn .4s ease}
.sidebar{animation:slideDown .35s ease}
.welcome{animation:scaleIn .5s ease}
.welcome .w-icon{animation:scaleIn .6s ease}
.w-pill:nth-child(1){animation:slideUp .4s ease .1s both}
.w-pill:nth-child(2){animation:slideUp .4s ease .15s both}
.w-pill:nth-child(3){animation:slideUp .4s ease .2s both}
.w-pill:nth-child(4){animation:slideUp .4s ease .25s both}
.w-pill:nth-child(5){animation:slideUp .4s ease .3s both}
.w-pill:nth-child(6){animation:slideUp .4s ease .35s both}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── App Layout ─────────────────────────────────── */
.app{display:flex;height:100vh;position:relative}

/* ── Sidebar Toggle ─────────────────────────────── */
.sidebar-toggle{
  position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:20;
  width:24px;height:48px;border:none;background:var(--bg2);border:1px solid var(--border);
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:14px;transition:all .15s;
  font-family:var(--font);
}
.sidebar-toggle:hover{background:var(--bg3);color:var(--text)}
.sidebar-toggle.open{left:260px}

/* ── Sidebar ────────────────────────────────────── */
.sidebar{
  width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:10;
  transition:margin-left .25s ease,opacity .2s ease;
  margin-left:0;opacity:1;
}
.sidebar.collapsed{
  margin-left:-260px;opacity:0;pointer-events:none;
}
.sidebar-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-header .logo-row{display:flex;align-items:center;gap:10px}
.sidebar-header .logo-icon{
  width:32px;height:32px;background:linear-gradient(135deg,var(--brand),var(--accent));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;font-weight:700;flex-shrink:0;
}
.sidebar-header .logo-text{font-size:18px;font-weight:800;letter-spacing:-.5px}
.sidebar-header .logo-text span{color:var(--brand)}
.sidebar-close{
  width:28px;height:28px;border:none;border-radius:6px;background:transparent;
  color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .12s;font-family:var(--font);
}
.sidebar-close:hover{background:var(--bg3);color:var(--text)}
.sidebar-nav{padding:12px 10px;flex:1;overflow-y:auto}

/* Sidebar sections */
.sidebar-section{margin-bottom:8px}
.sidebar-section .ss-header{
  display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;
  border-radius:6px;transition:background .12s;
}
.sidebar-section .ss-header:hover{background:var(--bg3)}
.sidebar-section .ss-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;flex:1}
.sidebar-section .ss-count{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:4px;font-family:var(--mono)}
.sidebar-section .ss-body{padding:2px 0;max-height:300px;overflow-y:auto;transition:max-height .2s}
.sidebar-section .ss-body.collapsed{max-height:0;overflow:hidden;padding:0}
.ss-item{
  display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;
  cursor:pointer;transition:all .12s;font-size:12px;color:var(--text);
  margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:var(--font);
}
.ss-item:hover{background:var(--bg3);color:var(--text)}
.ss-item .ssi-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ss-item .ssi-date{font-size:9px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.ss-item .ssi-badge{font-size:8px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.ss-item .ssi-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ss-item .ssi-dot.green{background:var(--green)}
.ss-item .ssi-dot.purple{background:var(--purple)}
.ss-empty{padding:12px 12px 8px;font-size:11px;color:var(--text3);text-align:center;font-style:italic}

/* ── Main Chat ──────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* Chat Header */
.chat-header{
  padding:10px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--bg);min-height:52px;
}
.chat-header .ch-left{display:flex;align-items:center;gap:10px}
.chat-header .ch-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.chat-header .ch-actions{display:flex;align-items:center;gap:4px}
.ch-header-btn{
  padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;
  color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;
  transition:all .12s;font-family:var(--font);display:flex;align-items:center;gap:4px;
}
.ch-header-btn:hover{background:var(--bg3);color:var(--text)}

/* Mode gear button */
.mode-gear-btn{
  width:32px;height:32px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-size:16px;position:relative;
}
.mode-gear-btn:hover{background:var(--bg3);color:var(--text)}

/* Mode dropdown */
.mode-dropdown{
  display:none;position:absolute;top:100%;right:0;margin-top:4px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  box-shadow:var(--shadow);z-index:30;overflow:hidden;min-width:140px;
}
.mode-dropdown.show{display:block}
.mode-dropdown button{
  display:block;width:100%;padding:8px 14px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--font);
  text-align:left;transition:background .1s;
}
.mode-dropdown button:hover{background:var(--bg3);color:var(--text)}
.mode-dropdown button.active{color:var(--accent);font-weight:600}
.mode-dropdown .md-label{
  padding:6px 14px 4px;font-size:9px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;
}
.mode-dropdown .md-check{float:right;color:var(--accent)}

/* ── Messages Area ──────────────────────────────── */
.messages{
  flex:1;overflow-y:auto;scroll-behavior:smooth;
  display:flex;flex-direction:column;
}
.messages-inner{
  max-width:780px;margin:0 auto;padding:0 24px;width:100%;
  display:flex;flex-direction:column;flex:1;
}

/* Welcome Screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 20px;text-align:center;
}
.welcome .w-icon{
  width:56px;height:56px;background:linear-gradient(135deg,var(--brand),var(--accent));
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 20px;color:#fff;font-weight:700;
}
.welcome .w-sub{color:var(--text2);font-size:13px;margin-bottom:32px}
.welcome .w-pills{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px;
}
.w-pill{
  padding:6px 14px;border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--text);cursor:pointer;
  font-size:12px;font-weight:500;font-family:var(--font);
  transition:all .15s;white-space:nowrap;
}
.w-pill:hover{border-color:var(--accent);background:var(--accent-glow);color:var(--text)}

/* Message Bubbles */
.msg{margin-bottom:16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{
  display:flex;justify-content:flex-end;gap:10px;align-items:flex-start;
}
.msg-user .msg-bubble{
  background:var(--accent);color:#fff;padding:10px 16px;border-radius:16px 16px 4px 16px;
  font-size:14px;line-height:1.5;max-width:75%;word-wrap:break-word;
}
.msg-user .msg-avatar{
  width:28px;height:28px;border-radius:7px;background:var(--accent2);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;margin-top:2px;
}
.msg-assistant{
  display:flex;gap:10px;align-items:flex-start;
}
.msg-assistant .msg-avatar{
  width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--brand),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;margin-top:2px;
}
.msg-assistant .msg-content{flex:1;min-width:0}
.msg-assistant .msg-bubble{
  background:var(--msg-bg);border:1px solid var(--msg-border);padding:16px 20px;
  border-radius:12px 12px 12px 4px;font-size:14px;line-height:1.7;word-wrap:break-word;
}
.msg-assistant .msg-bubble h1{font-size:20px;font-weight:700;margin:20px 0 10px;letter-spacing:-.3px}
.msg-assistant .msg-bubble h2{font-size:17px;font-weight:700;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--brand)}
.msg-assistant .msg-bubble h3{font-size:15px;font-weight:600;margin:14px 0 6px}
.msg-assistant .msg-bubble p{margin:8px 0}
.msg-assistant .msg-bubble strong{color:var(--text)}
.msg-assistant .msg-bubble ul,.msg-assistant .msg-bubble ol{padding-left:20px;margin:8px 0}
.msg-assistant .msg-bubble li{margin:4px 0}
.msg-assistant .msg-bubble blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:var(--bg3);border-radius:6px;color:var(--text2);font-style:italic}
.msg-assistant .msg-bubble code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:13px}
.msg-assistant .msg-bubble pre{background:var(--bg3);padding:14px 16px;border-radius:8px;overflow-x:auto;margin:12px 0;border:1px solid var(--border)}
.msg-assistant .msg-bubble pre code{background:none;padding:0;font-size:13px;line-height:1.5}
.msg-assistant .msg-bubble a{color:var(--accent)}
.msg-assistant .msg-bubble hr{margin:16px 0;border:none;border-top:1px solid var(--border)}

/* Thinking indicator */
.thinking-indicator{
  display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;animation:fadeIn .3s ease;
}
.thinking-indicator .ti-avatar{
  width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--brand),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;
}
.thinking-indicator .ti-content{flex:1;min-width:0}
.thinking-indicator .ti-steps{display:flex;flex-direction:column;gap:5px}
.ti-step{
  display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);font-size:12px;color:var(--text2);transition:all .2s;
}
.ti-step .ti-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:all .3s}
.ti-step.active{border-color:var(--accent);background:var(--accent-glow);color:var(--text)}
.ti-step.active .ti-dot{background:var(--accent);animation:pulse-dot 1s ease-in-out infinite}
.ti-step.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.ti-step.done .ti-dot{background:var(--green)}
.ti-step.error{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.ti-step.error .ti-dot{background:var(--red)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.ti-step .ti-label{font-weight:500}
.ti-step .ti-status{font-size:10px;color:var(--text3);margin-left:auto}
.ti-step.done .ti-status{color:var(--green)}
.ti-step.active .ti-status{color:var(--accent)}

/* Cursor blink for streaming */
.cursor-blink::after{
  content:'\u258A';animation:blink 1s step-end infinite;color:var(--accent);font-size:14px;margin-left:2px;
}
@keyframes blink{50%{opacity:0}}

/* Report action buttons */
.report-actions{
  display:flex;gap:6px;margin-top:10px;padding-left:4px;flex-wrap:wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;
  border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
  font-family:var(--font);white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:0 0 16px var(--accent-glow)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4)}
.btn-sm{padding:5px 10px;font-size:11px}

/* Error pill */
.error-pill{
  display:inline-flex;align-items:center;gap:8px;padding:8px 14px;margin:8px 0;
  background:var(--red-bg);border:1px solid var(--red);border-radius:8px;
  color:var(--red);font-size:13px;font-weight:500;animation:fadeIn .3s ease;
}
.error-pill .retry-btn{
  padding:3px 10px;border:1px solid var(--red);border-radius:5px;
  background:transparent;color:var(--red);cursor:pointer;font-size:11px;
  font-weight:600;font-family:var(--font);transition:all .12s;
}
.error-pill .retry-btn:hover{background:var(--red);color:#fff}

/* PDF prompt bar */
.pdf-prompt{
  display:none;align-items:center;gap:12px;padding:12px 16px;margin:12px 0 8px;
  background:linear-gradient(135deg,var(--accent-glow),transparent);
  border:1px solid var(--border);border-radius:10px;animation:fadeIn .4s ease;
}
.pdf-prompt.show{display:flex}
.pdf-prompt .pp-text{flex:1;min-width:0;font-size:12px;color:var(--text2)}
.pdf-prompt .pp-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}

/* ── Input Area ────────────────────────────────── */
.input-area{
  flex-shrink:0;padding:12px 24px 20px;background:var(--bg);
}
.input-wrap{
  max-width:680px;margin:0 auto;
  display:flex;align-items:center;gap:6px;
  background:var(--input-bg);border:1px solid var(--border);border-radius:16px;
  padding:4px 4px 4px 18px;transition:border-color .2s,box-shadow .2s;
}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 0 20px rgba(99,102,241,0.08)}
.input-wrap input{
  flex:1;border:none;background:transparent;padding:10px 0;font-size:15px;
  font-family:var(--font);color:var(--text);outline:none;line-height:1.5;
}
.input-wrap input::placeholder{color:var(--text2)}
.input-wrap .send-btn{
  width:38px;height:38px;border-radius:10px;border:none;background:var(--accent);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;
  font-size:16px;flex-shrink:0;
}
.input-wrap .send-btn:hover{background:var(--accent2)}
.input-wrap .send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-wrap .send-btn svg{width:16px;height:16px}

/* Mode indicator below input */
.input-mode-indicator{
  text-align:center;margin-top:8px;font-size:11px;color:var(--text3);
}

/* ── Toast ──────────────────────────────────────── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;
  border-radius:10px;background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow);font-size:13px;z-index:1000;display:none;
  animation:slideUp .3s ease;white-space:nowrap;
}
.toast.show{display:flex;align-items:center;gap:8px}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
.toast.info{border-color:var(--accent)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Theme Toggle ────────────────────────────────── */
.theme-toggle{
  width:32px;height:32px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;font-size:16px;font-family:var(--font);
}
.theme-toggle:hover{background:var(--bg3);color:var(--text);transform:rotate(15deg)}
.theme-toggle:active{transform:rotate(30deg) scale(.92)}

/* ── Responsive ──────────────────────────────────── */
@media(max-width:768px){
  .sidebar-toggle{width:20px;height:40px;font-size:12px}
  .sidebar-toggle.open{left:240px}
  .sidebar{width:240px}
  .sidebar.collapsed{margin-left:-240px}
  .sidebar-header{padding:12px 16px}
  .sidebar-header .logo-icon{width:28px;height:28px;font-size:15px}
  .sidebar-header .logo-text{font-size:16px}
  .sidebar-nav{padding:8px 6px}
  .chat-header{padding:8px 14px;min-height:44px}
  .chat-header .ch-title{font-size:13px}
  .ch-header-btn{padding:4px 8px;font-size:11px}
  .mode-gear-btn{width:28px;height:28px;font-size:14px}
  .theme-toggle{width:28px;height:28px;font-size:14px}
  .messages-inner{padding:0 14px;max-width:100%}
  .welcome{padding:24px 14px}
  .welcome .w-icon{width:44px;height:44px;border-radius:11px;font-size:22px;margin-bottom:14px}
  .welcome .w-sub{font-size:12px;margin-bottom:20px}

<script>
// ── Sidebar ──────────────────────────────────────────
let sidebarOpen = false;

function toggleSidebar(){
  sidebarOpen = !sidebarOpen;
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggle.classList.toggle('open', sidebarOpen);
  toggle.textContent = sidebarOpen ? '☰' : '☰';
}

// ── Sidebar section toggle ───────────────────────────
function toggleSidebarSection(id){
  const body = document.getElementById(id);
  if(body) body.classList.toggle('collapsed');
}

// ── Load report history ──────────────────────────────
async function loadReportHistory(){
  try{
    const res = await fetch('/api/reports');
    const data = await res.json();
    const body = document.getElementById('reportHistoryBody');
    const count = document.getElementById('reportCount');
    if(!body) return;
    const reports = data.reports || [];
    count.textContent = reports.length;
    if(reports.length === 0){
      body.innerHTML = '<div class="ss-empty">No reports yet</div>';
      return;
    }
    body.innerHTML = reports.slice(0, 15).map(r => `
      <button class="ss-item" onclick="loadReport('${escapeHtml(r.filename)}')" title="${escapeHtml(r.name)}">
        <span class="ssi-text">${escapeHtml(r.name.replace(/_/g,' ').replace(/\\d{8}_\\d{6}$/,'').trim().substring(0,40))}</span>
        <span class="ssi-date">${escapeHtml(r.date.split('·')[0].trim())}</span>
      </button>
    `).join('');
  } catch(e){
    console.error('Failed to load report history:', e);
  }
}

// ── Load report content ──────────────────────────────
async function loadReport(filename){
  if(isRunning) return;
  try{
    const res = await fetch('/api/reports/' + encodeURIComponent(filename));
    const data = await res.json();
    if(data.error){ showToast(data.error, 'error'); return; }
    clearChat();
    addUserMessage('Loaded: ' + (data.topic || filename));
    window._lastReportContent = data.content;
    // Set lastCompleteData so PDF download button works
    lastCompleteData = {
      markdown_basename: data.filename,
      has_pdf: data.has_pdf,
      topic: data.topic
    };
    displayReportContent(data.content, data.filename, data.has_pdf);
  } catch(e){
    showToast('Failed to load report: ' + e.message, 'error');
  }
}

// ── Load memory topics ───────────────────────────────
async function loadMemoryTopics(){
  try{
    const res = await fetch('/memory/topics');
    const data = await res.json();
    const topics = data.topics || [];
    const count = data.count || 0;
    const body = document.getElementById('memoryTopicsBody');
    const countEl = document.getElementById('memoryCount');
    if(countEl) countEl.textContent = count;
    if(!body) return;
    if(topics.length === 0){
      body.innerHTML = '<div class="ss-empty">No stored topics yet</div>';
      return;
    }
    body.innerHTML = topics.map(t => `
      <button class="ss-item" onclick="quickResearchTopic('${escapeHtml(t)}')" title="Research this topic">
        <span class="ssi-dot green"></span>
        <span class="ssi-text">${escapeHtml(t)}</span>
        <span class="ssi-badge">RAG</span>
      </button>
    `).join('');
  } catch(e){
    console.error('Failed to load memory topics:', e);
  }
}

// ── Init sidebar data ────────────────────────────────
function initSidebar(){
  loadReportHistory();
  loadMemoryTopics();
}
initSidebar();

// ── Mode dropdown ────────────────────────────────────
function toggleModeDropdown(e){
  e.stopPropagation();
  document.getElementById('modeDropdown').classList.toggle('show');
}
document.addEventListener('click', function(){
  document.getElementById('modeDropdown').classList.remove('show');
});

// ── Theme toggle ──────────────────────────────────────
function toggleTheme(){
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('resona-theme', next);
  const btn = document.getElementById('themeToggle');
  btn.textContent = next === 'dark' ? '☀' : '☾';
  btn.title = next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  showToast(next === 'dark' ? 'Dark mode' : 'Light mode', 'info');
}

// ── Init theme from localStorage ──────────────────────
(function(){
  const saved = localStorage.getItem('resona-theme');
  if(saved && (saved === 'light' || saved === 'dark')){
    document.documentElement.setAttribute('data-theme', saved);
    const btn = document.getElementById('themeToggle');
    if(btn){
      btn.textContent = saved === 'dark' ? '☀' : '☾';
      btn.title = saved === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
  }
})();

// ── State ────────────────────────────────────────────
let isRunning = false;
let lastCompleteData = null;
let selectedMode = 'crewai';
let abortController = null;

// ── Input handling ───────────────────────────────────
const input = document.getElementById('topicInput');
const sendBtn = document.getElementById('sendBtn');

input.addEventListener('input', ()=>{
  sendBtn.disabled = !input.value.trim() || isRunning;
});

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    submitTopic();
  }
}

// ── Mode selector ────────────────────────────────────
function setMode(mode){
  if(isRunning) return;
  selectedMode = mode;
  document.querySelectorAll('.mode-dropdown button').forEach(b => {
    const isActive = b.dataset.mode === mode;
    b.classList.toggle('active', isActive);
    const check = b.querySelector('.md-check');
    if(check) check.style.display = isActive ? 'inline' : 'none';
  });
  document.getElementById('modeDropdown').classList.remove('show');
  document.getElementById('modeIndicator').textContent = mode === 'crewai' ? 'CrewAI pipeline' : 'LangChain pipeline';
}

// ── Quick research topic pills ────────────────────────
function quickResearchTopic(topic){
  if(isRunning) return;
  input.value = topic;
  sendBtn.disabled = false;
  input.focus();
  submitTopic();
}

// ── Clear chat ───────────────────────────────────────
function clearChat(){
  if(isRunning) return;
  const inner = document.getElementById('messagesInner');
  inner.innerHTML = `
    <div class="welcome" id="welcomeScreen">
      <div class="w-icon">R</div>
      <p class="w-sub">Research any topic and get a comprehensive AI-generated report</p>
      <div class="w-pills">
        <button class="w-pill" onclick="quickResearchTopic('Impact of AI on hiring in 2025')">AI & Hiring 2025</button>
        <button class="w-pill" onclick="quickResearchTopic('Quantum computing breakthroughs 2026')">Quantum Computing</button>
        <button class="w-pill" onclick="quickResearchTopic('Electric vehicle market trends 2026')">EV Market Trends</button>
        <button class="w-pill" onclick="quickResearchTopic('AI in Healthcare 2026')">AI + Healthcare</button>
        <button class="w-pill" onclick="quickResearchTopic('Remote work and AI 2025')">Remote Work + AI</button>
        <button class="w-pill" onclick="quickResearchTopic('Edge AI and on-device machine learning trends 2025')">Edge AI & ML</button>
      </div>
    </div>
  `;
  input.value = '';
  sendBtn.disabled = true;
  document.getElementById('messagesContainer').scrollTop = 0;
  window._lastReportContent = null;
  lastCompleteData = null;
}

// ── Submit topic ─────────────────────────────────────
async function submitTopic(){
  const topic = input.value.trim();
  if(!topic || isRunning) return;

  clearChat();

  addUserMessage(topic);

  input.value = '';
  sendBtn.disabled = true;

  lastCompleteData = null;
  window._lastReportContent = null;

  await runAgent(topic);
}

// ── Add user message ─────────────────────────────────
function addUserMessage(text){
  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `
    <div class="msg-bubble">${escapeHtml(text)}</div>
    <div class="msg-avatar">U</div>
  `;
  inner.appendChild(div);
  scrollToBottom();
}

// ── Add thinking indicator (mode-aware) ──────────────
function addThinkingIndicator(mode){
  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'thinking-indicator';
  div.id = 'thinkingIndicator';
  let stepsHtml = '';
  if(mode === 'langchain'){
    stepsHtml = `
      <div class="ti-step" id="ti-research">
        <div class="ti-dot"></div>
        <span class="ti-label">Research Chain</span>
        <span class="ti-status">waiting</span>
      </div>
      <div class="ti-step" id="ti-analysis">
        <div class="ti-dot"></div>
        <span class="ti-label">Analysis Chain</span>
        <span class="ti-status">waiting</span>
      </div>
      <div class="ti-step" id="ti-writing">
        <div class="ti-dot"></div>
        <span class="ti-label">Writing Chain</span>
        <span class="ti-status">waiting</span>
      </div>`;
  } else {
    stepsHtml = `
      <div class="ti-step" id="ti-research">
        <div class="ti-dot"></div>
        <span class="ti-label">Senior Research Analyst</span>
        <span class="ti-status">waiting</span>
      </div>
      <div class="ti-step" id="ti-analysis">
        <div class="ti-dot"></div>
        <span class="ti-label">Data Analyst</span>
        <span class="ti-status">waiting</span>
      </div>
      <div class="ti-step" id="ti-writing">
        <div class="ti-dot"></div>
        <span class="ti-label">Technical Writer</span>
        <span class="ti-status">waiting</span>
      </div>`;
  }
  div.innerHTML = `
    <div class="ti-avatar">R</div>
    <div class="ti-content">
      <div class="ti-steps" id="tiSteps">${stepsHtml}</div>
    </div>
  `;
  inner.appendChild(div);
  scrollToBottom();
  return div;
}

function updateStep(phase, status, message){
  const step = document.getElementById('ti-' + phase);
  if(!step) return;
  step.className = 'ti-step ' + status;
  const statusEl = step.querySelector('.ti-status');
  if(status === 'running'){
    statusEl.textContent = message || 'running...';
  } else if(status === 'complete'){
    statusEl.textContent = 'done';
  } else if(status === 'error'){
    statusEl.textContent = 'failed';
  }
}

function removeThinkingIndicator(){
  const el = document.getElementById('thinkingIndicator');
  if(el) el.remove();
}

// ── Display report content ───────────────────────────
function displayReportContent(content, filename, hasPdf){
  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  const mdContent = window.marked ? window.marked.parse(content) : content;
  const pdfBtn = hasPdf ? `<button class="btn btn-sm btn-secondary" onclick="downloadPdf()">Download PDF</button>` : '';
  div.innerHTML = `
    <div class="msg-avatar">R</div>
    <div class="msg-content">
      <div class="msg-bubble">${mdContent}</div>
      <div class="report-actions">
        <button class="btn btn-sm btn-secondary" onclick="copyReportContent()">Copy</button>
        ${pdfBtn}
      </div>
    </div>
  `;
  inner.appendChild(div);
  scrollToBottom();
}

// ── Typewriter display report (character by character) ─
function typewriterDisplayReport(content, filename, hasPdf){
  const inner = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.innerHTML = `
    <div class="msg-avatar">R</div>
    <div class="msg-content">
      <div class="msg-bubble cursor-blink" id="typewriterBubble"></div>
    </div>
  `;
  inner.appendChild(div);

  window._lastReportContent = content;

  let index = 0;
  const interval = setInterval(() => {
    index++;
    const bubble = document.getElementById('typewriterBubble');
    if(!bubble){ clearInterval(interval); return; }

    const visible = content.slice(0, index);
    try {
      bubble.innerHTML = window.marked ? window.marked.parse(visible) : visible;
    } catch(e) {
      bubble.innerHTML = visible;
    }
    scrollToBottom();

    if(index >= content.length){
      clearInterval(interval);
      bubble.classList.remove('cursor-blink');
      // Add action buttons after animation completes
      const contentDiv = bubble.closest('.msg-content');
      if(contentDiv){
        const actions = document.createElement('div');
        actions.className = 'report-actions';
        const pdfBtn = hasPdf ? '<button class="btn btn-sm btn-secondary" onclick="downloadPdf()">Download PDF</button>' : '';
        actions.innerHTML = `
          <button class="btn btn-sm btn-secondary" onclick="copyReportContent()">Copy</button>
          ${pdfBtn}
        `;
        contentDiv.appendChild(actions);
      }
    }
  }, 8);
}

// ── Copy report content ──────────────────────────────
function copyReportContent(){
  const text = window._lastReportContent || '';
  if(!text){ showToast('No content to copy', 'error'); return; }
  navigator.clipboard.writeText(text).then(() => {
    showToast('Report copied to clipboard', 'success');
  }).catch(() => {
    showToast('Failed to copy', 'error');
  });
}

// ── Download PDF ─────────────────────────────────────
function downloadPdf(){
  if(!lastCompleteData){ showToast('No report available', 'error'); return; }
  const mdBasename = lastCompleteData.markdown_basename;
  if(!mdBasename){ showToast('No report available', 'error'); return; }
  if(lastCompleteData.has_pdf === false){ showToast('PDF not available for this report', 'error'); return; }
  const pdfUrl = '/api/reports/' + encodeURIComponent(mdBasename.replace('.md', '')) + '.md/pdf';
  window.open(pdfUrl, '_blank');
}

// ── Run Agent ────────────────────────────────────────
async function runAgent(topic){
  isRunning = true;
  sendBtn.disabled = true;

  addThinkingIndicator(selectedMode);
  document.getElementById('cancelBtn').style.display = 'inline-flex';

  try{
    abortController = new AbortController();
    const response = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        topic: topic,
        format: 'markdown+pdf',
        depth: 'standard',
        mode: selectedMode
      }),
      signal: abortController.signal
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let currentEvent = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream: true});

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for(const line of lines){
        if(line.startsWith('event: ')){
          currentEvent = line.slice(7).trim();
          continue;
        }
        if(line.startsWith('data: ')){
          try{
            const data = JSON.parse(line.slice(6));
            handleSSEEvent(currentEvent, data);
          }catch(e){}
        }
      }
    }
  }catch(e){
    if(e.name === 'AbortError'){
      // User cancelled
    } else {
      showToast('Connection error: ' + e.message, 'error');
    }
  }finally{
    isRunning = false;
    sendBtn.disabled = !input.value.trim();
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function handleSSEEvent(type, data){
    switch(type){

      case 'phase': {
        const {phase, status, message} = data;
        updateStep(phase, status, message);
        break;
      }

      case 'content_start': {
        removeThinkingIndicator();
        break;
      }

      case 'chunk': {
        // Show assistant bubble on first chunk if not already showing
        let assistantBubble = document.getElementById('assistantBubble');
        if(!assistantBubble){
          removeThinkingIndicator();
          const inner = document.getElementById('messagesInner');
          const div = document.createElement('div');
          div.className = 'msg msg-assistant';
          div.innerHTML = `
            <div class="msg-avatar">R</div>
            <div class="msg-content">
              <div class="msg-bubble cursor-blink" id="assistantBubble"></div>
            </div>
          `;
          inner.appendChild(div);
          assistantBubble = document.getElementById('assistantBubble');
        }
        assistantBubble.classList.remove('cursor-blink');
        window._lastReportContent = (window._lastReportContent || '') + data.text;
        try{
          assistantBubble.innerHTML = window.marked ? window.marked.parse(window._lastReportContent) : window._lastReportContent;
        }catch(e){
          assistantBubble.innerHTML = window._lastReportContent;
        }
        assistantBubble.classList.add('cursor-blink');
        scrollToBottom();
        break;
      }

      case 'complete': {
        removeThinkingIndicator();

        // Remove any chunk-streaming bubble so we can do a clean typewriter render
        const existingBubble = document.getElementById('assistantBubble');
        if(existingBubble){
          const parentMsg = existingBubble.closest('.msg');
          if(parentMsg) parentMsg.remove();
        }

        const reportContent = data.full_content || data.report || '';
        const filename = data.markdown_basename || '';

        if(reportContent){
          window._lastReportContent = reportContent;
          typewriterDisplayReport(reportContent, filename, data.has_pdf);
        }

        lastCompleteData = data;

        // Clear input and refocus
        input.value = '';
        sendBtn.disabled = true;
        input.focus();

        // Refresh sidebar
        loadReportHistory();
        loadMemoryTopics();
        showToast('Research complete', 'success');
        break;
      }

      case 'error': {
        removeThinkingIndicator();
        const inner = document.getElementById('messagesInner');
        const div = document.createElement('div');
        div.className = 'msg msg-assistant';
        div.innerHTML = `
          <div class="msg-avatar">R</div>
          <div class="msg-content">
            <div class="error-pill">
              <span>Research failed - try again</span>
              <button class="retry-btn" onclick="quickResearchTopic('${escapeHtml(topic)}')">Retry</button>
            </div>
          </div>
        `;
        inner.appendChild(div);
        scrollToBottom();
        showToast(data.message || 'Research failed', 'error');
        break;
      }
    }
  }
}

// ── Cancel research ──────────────────────────────────
function cancelResearch(){
  if(abortController){
    abortController.abort();
    abortController = null;
  }
  isRunning = false;
  sendBtn.disabled = !input.value.trim();
  document.getElementById('cancelBtn').style.display = 'none';
  removeThinkingIndicator();
  showToast('Research cancelled', 'info');
}

// ── Utilities ────────────────────────────────────────
function escapeHtml(text){
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML.replace(/'/g, '&#39;');
}

function scrollToBottom(){
  const container = document.getElementById('messagesContainer');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function showToast(message, type='info'){
  const toast = document.getElementById('toast');
  toast.className = 'toast show ' + type;
  toast.innerHTML = `<span>${message}</span>`;
  clearTimeout(toast._timer);
  toast._timer = setTimeout(()=>toast.classList.remove('show'), 4000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
