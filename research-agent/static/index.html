<style>

    --bg: 10 10 10; --surface: 22 22 24; --surface-hover: 30 30 33;
    --border: 38 38 42; --fg: 240 240 242; --muted: 150 150 160;
    --primary: 99 102 241; --primary-fg: 255 255 255;
  }
  :root.light {
    --bg: 252 252 253; --surface: 245 245 247; --surface-hover: 238 238 241;
    --border: 224 224 230; --fg: 20 20 24; --muted: 100 100 110;

  }

  .message-in { animation: msgIn .25s ease-out; }
  @keyframes msgIn { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform: none;} }
  .prose-resona { font-size: 15px; line-height: 1.75; color: rgb(var(--fg)); }
  .prose-resona h1 { font-size: 1.6em; font-weight: 700; margin: 1.2em 0 .5em; letter-spacing: -.01em; }
  .prose-resona h2 { font-size: 1.3em; font-weight: 600; margin: 1.4em 0 .4em; }
  .prose-resona h3 { font-size: 1.1em; font-weight: 600; margin: 1.2em 0 .3em; }
  .prose-resona p { margin: .7em 0; }
  .prose-resona ul, .prose-resona ol { margin: .7em 0; padding-left: 1.4em; }
  .prose-resona ul { list-style: disc; } .prose-resona ol { list-style: decimal; }
  .prose-resona li { margin: .25em 0; }
  .prose-resona a { color: rgb(var(--primary)); text-decoration: underline; text-underline-offset: 2px; }
  .prose-resona code { background: rgb(var(--surface)); padding: 1px 5px; border-radius: 4px; font-size: .9em; }
  .prose-resona pre { background: rgb(var(--surface)); padding: 14px 16px; border-radius: 10px; overflow:auto; margin: .8em 0; border: 1px solid rgb(var(--border)); }
  .prose-resona pre code { background: transparent; padding: 0; }
  .prose-resona blockquote { border-left: 3px solid rgb(var(--border)); padding-left: 1em; color: rgb(var(--muted)); margin: .8em 0; }
  .prose-resona table { width:100%; border-collapse: collapse; margin: .8em 0; font-size: .95em; }
  .prose-resona th, .prose-resona td { border: 1px solid rgb(var(--border)); padding: 6px 10px; text-align: left; }
  .prose-resona strong { color: rgb(var(--fg)); }
  .prose-resona hr { margin: 1em 0; border: none; border-top: 1px solid rgb(var(--border)); }
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgb(var(--border)); border-radius: 8px; }

  /* ── Responsive mobile drawer ── */
  .sidebar-overlay {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

  @media (max-width: 767px) {
    .sidebar-drawer {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
      width: 260px; max-width: 80vw;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      padding-left: env(safe-area-inset-left, 0px);
    }
    .sidebar-drawer.open { transform: translateX(0); }
    .desktop-sidebar { display: none !important; }
  }
  @media (min-width: 768px) {
    .mobile-sidebar-toggle { display: none !important; }
  }

  /* ── Old-style logo ── */
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, rgb(var(--primary)), rgb(var(--primary)/.6));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff; font-weight: 700; flex-shrink: 0;
    position: relative;
  }
  .logo-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgb(var(--primary));
    position: absolute;
  }
  .logo-dot.tl { top: -3px; right: -3px; }
  .logo-dot.br { bottom: -3px; left: -3px; }
  .logo-text {
    font-size: 20px; font-weight: 800; letter-spacing: -.5px;
  }
  .logo-text .o { color: rgb(var(--primary)); }
</style>

<body>
<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "marked": "https://esm.sh/marked@12.0.2"
  }

<script type="module">
import React, { useState, useEffect, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { marked } from 'marked';

const h = React.createElement;
const API_BASE = window.RESONA_API_BASE || '';

// ===== ADAPTED API FOR EXISTING BACKEND =====
async function fetchReports() {
  try {
    const r = await fetch(`${API_BASE}/api/reports`);
    if (!r.ok) return [];
    const data = await r.json();
    // Our backend returns { reports: [{filename, name, date, ...}] }
    return (data.reports || []).map((rep, i) => ({
      id: rep.filename || String(i),
      title: rep.name || rep.filename || 'Untitled',
      created_at: rep.date || '',
      filename: rep.filename,
      has_pdf: rep.has_pdf || false,
    }));
  } catch { return []; }
}

async function fetchMemoryTopics() {
  try {
    const r = await fetch(`${API_BASE}/memory/topics`);
    if (!r.ok) return [];
    const data = await r.json();
    return data.topics || [];
  } catch { return []; }
}

async function fetchReportContent(filename) {
  try {
    const r = await fetch(`${API_BASE}/api/reports/${encodeURIComponent(filename)}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function runResearch({ query, pipeline, signal, onEvent }) {
  // Adapt to our backend API: {topic, format, depth, model, mode}
  const res = await fetch(`${API_BASE}/api/run`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Accept: 'text/event-stream' },
    body: JSON.stringify({
      topic: query,
      format: 'markdown+pdf',
      depth: 'standard',
      model: 'llama-3.1-8b-instant',
      mode: pipeline,
    }),
    signal,
  });
  if (!res.ok || !res.body) { onEvent({ type: 'error', message: `Request failed: ${res.status}` }); return; }
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    // Accumulate lines into complete SSE events
    while (true) {
      const idx = buffer.indexOf('\n');
      if (idx === -1) break;
      const line = buffer.slice(0, idx);
      buffer = buffer.slice(idx + 1);
      handleSSELine(line, eventAccum, onEvent);
    }
  }
  // Flush any remaining accumulated event
  if (eventAccum.dataLines.length > 0) {
    const ev = buildSSEEvent(eventAccum.eventType, eventAccum.dataLines.join('\n'));
    if (ev) onEvent(ev);
  }
}

// SSE event accumulator state
const eventAccum = { eventType: 'message', dataLines: [] };

function handleSSELine(line, accum, onEvent) {
  if (line.startsWith('event:')) {
    // Emit previous accumulated event if any
    if (accum.dataLines.length > 0) {
      const ev = buildSSEEvent(accum.eventType, accum.dataLines.join('\n'));
      if (ev) onEvent(ev);
      accum.dataLines = [];
    }
    accum.eventType = line.slice(6).trim();
  } else if (line.startsWith('data:')) {
    accum.dataLines.push(line.slice(5).trim());
  } else if (!line.trim() && accum.dataLines.length > 0) {
    // Empty line = end of event
    const ev = buildSSEEvent(accum.eventType, accum.dataLines.join('\n'));
    if (ev) onEvent(ev);
    accum.dataLines = [];
    accum.eventType = 'message';
  }
}

function buildSSEEvent(eventType, dataStr) {
  let p = {};
  try { p = dataStr ? JSON.parse(dataStr) : {}; } catch { p = { raw: dataStr }; }
  switch (eventType) {
    case 'phase': return { type: 'phase', phase: p.phase || p.name || '', status: p.status || 'running', message: p.message || '' };
    case 'content_start': return { type: 'content_start' };
    case 'chunk': return { type: 'chunk', text: p.text || p.delta || p.content || '' };
    case 'complete': return { type: 'complete', report: p };
    case 'error': return { type: 'error', message: p.message || 'Unknown error' };
    default: return null;
  }
}

// ===== ICONS =====
const Icon = ({ d, size = 16, stroke = 2 }) =>
  h('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round' },
    Array.isArray(d) ? d.map((p, i) => h('path', { key: i, d: p })) : h('path', { d }));
const I = {
  plus:    () => h(Icon, { d: ['M12 5v14', 'M5 12h14'] }),
  menu:    () => h(Icon, { d: ['M3 6h18','M3 12h18','M3 18h18'] }),
  send:    () => h(Icon, { d: ['M12 19V5','M5 12l7-7 7 7'], stroke: 2.5 }),
  stop:    () => h('svg', { width:14, height:14, viewBox:'0 0 24 24', fill:'currentColor' }, h('rect',{x:6,y:6,width:12,height:12,rx:1})),
  copy:    () => h(Icon, { d: ['M9 9h10v10H9z','M5 15V5h10'] }),
  check:   () => h(Icon, { d: 'M5 13l4 4L19 7' }),
  refresh: () => h(Icon, { d: ['M3 12a9 9 0 0 1 15-6.7L21 8','M21 3v5h-5','M21 12a9 9 0 0 1-15 6.7L3 16','M3 21v-5h5'] }),
  download:() => h(Icon, { d: ['M12 3v12','M7 10l5 5 5-5','M5 21h14'] }),
  sparkle: () => h(Icon, { d: 'M12 3l1.9 4.8L18.7 9.7l-4.8 1.9L12 16.4l-1.9-4.8L5.3 9.7l4.8-1.9L12 3z' }),
  sun:     () => h(Icon, { d: ['M12 4V2','M12 22v-2','M4.93 4.93l1.41 1.41','M17.66 17.66l1.41 1.41','M2 12h2','M20 12h2','M4.93 19.07l1.41-1.41','M17.66 6.34l1.41-1.41','M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z'] }),
  moon:    () => h(Icon, { d: 'M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z' }),
  doc:     () => h(Icon, { d: ['M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z','M14 3v6h6'] }),
  book:    () => h(Icon, { d: ['M4 19.5A2.5 2.5 0 0 1 6.5 17H20','M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'] }),
  load:    () => h(Icon, { d: ['M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4','M7 9l5 5 5-5','M12 14V3'] }),
};

// ===== COMPONENTS =====
function Sidebar({ collapsed, onToggle, onNewResearch, reports, memories, theme, onToggleTheme, onLoadReport, onMemoryResearch, mobileOpen, onMobileClose }) {
  // Build base sidebar content (always shown on mobile, conditional on desktop)
  const headerRow = h('div', { className: 'flex items-center gap-2 px-3 h-14 border-b border-border shrink-0' },
    h('button', { type: 'button', onClick: onToggle, className: 'p-2 rounded-md hover:bg-surface-hover text-muted' }, h(I.menu)),
    h('div', { className: 'logo-row flex items-center gap-2.5' },
      h('div', { className: 'logo-icon' },
        h(I.sparkle),
        h('span', { className: 'logo-dot tl' }),
        h('span', { className: 'logo-dot br' })
      ),
      h('div', { className: 'logo-text' },
        'Res',
        h('span', { className: 'o' }, 'o'),
        'na'
      )
    )
  );

  const newResearchBtn = h('div', { className: 'p-3' },
    h('button', {
      type: 'button',
      onClick: onNewResearch,
      className: 'w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-primary text-primary-fg hover:opacity-90 text-sm font-medium'
    }, h(I.plus), 'New Research')
  );
  const contentArea = h('div', { className: 'flex-1 overflow-y-auto scroll-thin px-2' },
    h('div', { className: 'text-[11px] uppercase tracking-wider text-muted px-2 mt-2 mb-1' }, 'Report History'),
    reports.length === 0
      ? h('div', { className: 'text-xs text-muted px-2 py-3' }, 'No reports yet')
      : reports.map(r => h('button', {
          key: r.id,
          onClick: () => { onLoadReport(r); onMobileClose && onMobileClose(); },
          className: 'w-full text-left px-2.5 py-2 rounded-md hover:bg-surface-hover text-sm'
        },
          h('div', { className: 'truncate text-foreground' }, r.title || 'Untitled'),
          h('div', { className: 'text-[11px] text-muted mt-0.5' }, r.created_at || '')
        )),
    h('div', { className: 'text-[11px] uppercase tracking-wider text-muted px-2 mt-5 mb-1' }, 'Memory Topics'),
    memories.length === 0
      ? h('div', { className: 'text-xs text-muted px-2 py-1.5' }, 'No memories yet')
      : memories.map(t => h('button', {
          key: t,
          onClick: () => { onMemoryResearch(t); onMobileClose && onMobileClose(); },
          className: 'w-full text-left px-2.5 py-2 rounded-md hover:bg-surface-hover text-sm flex items-center gap-2'
        },
          h('span', { className: 'w-1.5 h-1.5 rounded-full bg-green-500 shrink-0' }),
          h('span', { className: 'truncate text-foreground' }, t)
        ))
  );

  const themeRow = h('div', { className: 'border-t border-border p-3 flex items-center justify-between shrink-0' },
    h('span', { className: 'text-xs text-muted' }, 'Theme'),
    h('button', {
      onClick: onToggleTheme,
      className: 'p-1.5 rounded-md hover:bg-surface-hover text-muted'
    }, theme === 'dark' ? h(I.sun) : h(I.moon))
  );

  // Mobile drawer: always shows full content
  const mobileContent = [headerRow, newResearchBtn, contentArea, themeRow];

  // Desktop: hides content sections when collapsed (w-14)
  const desktopContent = collapsed
    ? [headerRow]
    : [headerRow, newResearchBtn, contentArea, themeRow];

  // Render: desktop sidebar + mobile drawer
  return [
    // Desktop sidebar (hidden on mobile via CSS)
    h('aside', {
      key: 'desktop',
      className: 'desktop-sidebar shrink-0 transition-all duration-300 border-r border-border bg-surface/40 flex flex-col ' + (collapsed ? 'w-14' : 'w-64'),
    }, ...desktopContent),

    // Mobile drawer overlay
    h('div', {
      key: 'overlay',
      className: 'sidebar-overlay' + (mobileOpen ? ' open' : ''),
      onClick: onMobileClose,
    }),

    // Mobile drawer
    h('aside', {
      key: 'mobile',
      className: 'sidebar-drawer border-r border-border bg-surface flex flex-col' + (mobileOpen ? ' open' : ''),
    }, ...mobileContent),
  ];
}

function EmptyState({ onPick }) {
  const items = [
    { icon: I.book, label: 'Market analysis', desc: 'Latest trends in AI infrastructure investments' },
    { icon: I.doc, label: 'Scientific deep dive', desc: 'State of CRISPR gene editing in 2025' },
    { icon: I.book, label: 'Geopolitics', desc: 'Implications of the EU AI Act for global startups' },
    { icon: I.doc, label: 'Technology landscape', desc: 'Compare modern vector databases' },
  ];
  return h('div', { className: 'flex flex-col items-center justify-center px-6 py-12 max-w-3xl mx-auto w-full' },
    h('div', { className: 'w-14 h-14 rounded-2xl grid place-items-center bg-gradient-to-br from-primary to-primary/60 text-primary-fg shadow-lg shadow-primary/20 mb-5' }, h(I.sparkle)),
    h('h1', { className: 'text-2xl font-semibold tracking-tight' }, 'Resona'),
    h('p', { className: 'mt-2 text-[15px] text-muted text-center' }, 'Ask anything. Get a researched, cited report.'),
    h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-2.5 mt-10 w-full' },
      items.map(it => h('button', {
        key: it.label,
        onClick: () => onPick(it.desc),
        className: 'text-left p-4 rounded-xl border border-border bg-surface hover:bg-surface-hover hover:border-primary/40 transition'
      },
        h('div', { className: 'flex items-start gap-3' },
          h('div', { className: 'p-1.5 rounded-md border border-border text-primary' }, h(it.icon)),
          h('div', null,
            h('div', { className: 'text-[13px] font-medium' }, it.label),
            h('div', { className: 'text-[12.5px] text-muted mt-0.5' }, it.desc)
          )
        )
      ))
    )
  );
}

function UserMessage({ content }) {
  return h('div', { className: 'message-in flex justify-end' },
    h('div', { className: 'max-w-[78%] rounded-2xl rounded-tr-md bg-primary text-primary-fg px-4 py-2.5 text-[14.5px] leading-relaxed whitespace-pre-wrap' }, content)
  );
}

function AssistantMessage({ message, onRegenerate }) {
  const [copied, setCopied] = useState(false);
  const streaming = message.status === 'streaming';
  const html = message.content ? marked.parse(message.content, { breaks: true }) : '';

  const copy = async () => {
    await navigator.clipboard.writeText(message.content);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  const download = () => {
    const w = window.open('', '_blank'); if (!w) return;
    w.document.write(`<html><head><title>Resona Report</title>
      <style>body{font-family:Inter,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.7;color:#222}</style>
      </head><body>${marked.parse(message.content)}</body></html>`);
    w.document.close();
    setTimeout(() => w.print(), 200);
  };

  return h('div', { className: 'message-in' },
    streaming && message.phase && h('div', { className: 'text-[12px] text-muted mb-3 flex items-center gap-2' },
      h('span', { className: 'thinking-dot' }),
      h('span', { className: 'thinking-dot', style: { animationDelay: '.2s' } }),
      h('span', { className: 'thinking-dot', style: { animationDelay: '.4s' } }),
      h('span', { className: 'ml-1' }, message.phase)
    ),
    message.content
      ? h('div', { className: 'prose-resona', dangerouslySetInnerHTML: { __html: html } })
      : streaming && h('div', { className: 'flex items-center gap-1.5 py-2' },
          h('span', { className: 'thinking-dot' }),
          h('span', { className: 'thinking-dot', style: { animationDelay: '.2s' } }),
          h('span', { className: 'thinking-dot', style: { animationDelay: '.4s' } })
        ),
    !streaming && message.content && h('div', { className: 'mt-4 flex items-center gap-1 text-muted' },
      h('button', { onClick: copy, title: 'Copy', className: 'p-1.5 rounded-md hover:bg-surface hover:text-foreground' }, copied ? h(I.check) : h(I.copy)),
      h('button', { onClick: download, title: 'Download', className: 'p-1.5 rounded-md hover:bg-surface hover:text-foreground' }, h(I.download)),
      onRegenerate && h('button', { onClick: onRegenerate, title: 'Regenerate', className: 'p-1.5 rounded-md hover:bg-surface hover:text-foreground' }, h(I.refresh))
    )
  );
}

function InputBar({ value, onChange, onSubmit, onStop, isStreaming }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }, [value]);
  return h('div', { className: 'px-4 pb-4 pt-2' },
    h('div', { className: 'max-w-3xl mx-auto w-full' },
      h('form', {
        onSubmit: (e) => { e.preventDefault(); if (!isStreaming && value.trim()) onSubmit(); },
        className: 'relative flex items-end gap-2 rounded-2xl border border-border bg-surface focus-within:border-primary/50 p-2 pl-4 shadow-lg shadow-black/20'
      },
        h('textarea', {
          ref,
          value,
          onChange: (e) => onChange(e.target.value),
          onKeyDown: (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              if (!isStreaming && value.trim()) onSubmit();
            }
          },
          id: 'query-input',
          name: 'query',
          placeholder: 'Ask anything to research...',
          rows: 1,
          className: 'flex-1 resize-none bg-transparent outline-none text-[15px] leading-relaxed py-1.5 placeholder:text-muted/70 max-h-[200px]'
        }),
        isStreaming
          ? h('button', { type: 'button', onClick: onStop, title: 'Stop',
              className: 'shrink-0 grid place-items-center w-9 h-9 rounded-xl bg-foreground text-background hover:opacity-90' }, h(I.stop))
          : h('button', { type: 'submit', disabled: !value.trim(), title: 'Send',
              className: 'shrink-0 grid place-items-center w-9 h-9 rounded-xl bg-primary text-primary-fg disabled:opacity-40 hover:opacity-90' }, h(I.send))
      ),
      h('p', { className: 'text-[11px] text-muted/70 text-center mt-2' }, 'Resona may produce inaccurate information. Verify important facts.')
    )
  );
}

// ===== APP =====
const PHASE = { researching: 'Researching', analyzing: 'Analyzing', writing: 'Writing', planning: 'Planning', verifying: 'Verifying' };
const prettyPhase = (p) => PHASE[String(p).toLowerCase()] || (p.charAt(0).toUpperCase() + p.slice(1));

function App() {
  const [collapsed, setCollapsed] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const pipeline = 'langgraph';
  const [streaming, setStreaming] = useState(false);
  const [reports, setReports] = useState([]);
  const [memories, setMemories] = useState([]);
  const abortRef = useRef(null);
  const scrollRef = useRef(null);
  const [lastPdfData, setLastPdfData] = useState(null);

  // Theme side effect
  useEffect(() => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    document.documentElement.classList.toggle('light', theme === 'light');
    localStorage.setItem('theme', theme);
  }, [theme]);

  // Fetch reports and memories on mount
  const refreshReports = useCallback(() => { fetchReports().then(setReports); }, []);
  const refreshMemories = useCallback(() => { fetchMemoryTopics().then(setMemories); }, []);

  useEffect(() => { refreshReports(); refreshMemories(); }, [refreshReports, refreshMemories]);

  // Auto-scroll
  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
  }, [messages]);

  // Handle loading a report
  const handleLoadReport = useCallback(async (report) => {
    if (streaming) return;
    const data = await fetchReportContent(report.filename);
    if (!data || data.error) return;
    setMessages([
      { id: crypto.randomUUID(), role: 'user', content: '📂 Loaded: ' + (data.topic || report.title) },
      { id: crypto.randomUUID(), role: 'assistant', content: data.content, status: 'complete' },
    ]);
  }, [streaming]);

  // Handle memory topic click
  const handleMemoryResearch = useCallback((topic) => {
    if (streaming) return;
    setInput(topic);
  }, [streaming]);

  // Submit research
  const handleSubmit = useCallback(async (override) => {
    const q = (override ?? input).trim();
    if (!q || streaming) return;
    const userId = crypto.randomUUID();
    const asstId = crypto.randomUUID();
    setMessages(m => [...m,
      { id: userId, role: 'user', content: q },
      { id: asstId, role: 'assistant', content: '', status: 'streaming', phase: 'Researching' }
    ]);
    setInput('');
    setStreaming(true);
    setLastPdfData(null);
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    try {
      await runResearch({
        query: q,        pipeline: 'langgraph', signal: ctrl.signal,
        onEvent: (ev) => {
          switch (ev.type) {
            case 'phase':
              setMessages(m => m.map(msg =>
                msg.id === asstId ? { ...msg, phase: prettyPhase(ev.phase) } : msg
              ));
              break;
            case 'content_start':
              setMessages(m => m.map(msg =>
                msg.id === asstId ? { ...msg, phase: undefined } : msg
              ));
              break;
            case 'chunk':
              setMessages(m => m.map(msg =>
                msg.id === asstId ? { ...msg, content: msg.content + ev.text } : msg
              ));
              break;
            case 'complete':
              setMessages(m => m.map(msg =>
                msg.id === asstId
                  ? { ...msg, content: ev.report?.markdown || msg.content, status: 'complete', phase: undefined }
                  : msg
              ));
              setLastPdfData(ev.report);
              refreshReports();
              refreshMemories();
              break;
            case 'error':
              setMessages(m => m.map(msg =>
                msg.id === asstId
                  ? { ...msg, content: msg.content + `\n\n> **Error:** ${ev.message}`, status: 'error', phase: undefined }
                  : msg
              ));
              break;
          }
        }
      });
    } catch (_) {
      setMessages(m => m.map(msg =>
        msg.id === asstId && msg.status === 'streaming'
          ? { ...msg, status: 'complete', phase: undefined, content: msg.content || '_Request stopped._' }
          : msg
      ));
    } finally {
      setMessages(m => m.map(msg =>
        msg.id === asstId
          ? { ...msg, status: msg.status === 'streaming' ? 'complete' : msg.status, phase: undefined }
          : msg
      ));
      setStreaming(false);
      abortRef.current = null;
    }
  }, [input, pipeline, streaming, refreshReports, refreshMemories]);

  const stop = () => abortRef.current?.abort();
  const newResearch = () => { if (streaming) stop(); setMessages([]); setInput(''); setLastPdfData(null); };
  const regenerate = (idx) => {
    const prevUser = [...messages.slice(0, idx)].reverse().find(m => m.role === 'user');
    if (!prevUser) return;
    setMessages(m => m.slice(0, idx));
    handleSubmit(prevUser.content);
  };

  return h('div', { className: 'flex h-screen w-full overflow-hidden' },
    h(Sidebar, {
      collapsed,
      onToggle: () => setCollapsed(c => !c),
      mobileOpen,
      onMobileClose: () => setMobileOpen(false),
      onNewResearch: newResearch,
      reports,
      memories,
      theme,
      onToggleTheme: () => setTheme(t => t === 'dark' ? 'light' : 'dark'),
      onLoadReport: handleLoadReport,
      onMemoryResearch: handleMemoryResearch,
    }),
    h('main', { className: 'flex-1 flex flex-col min-w-0' },
      h('header', { className: 'h-14 border-b border-border flex items-center justify-between px-3 md:px-5 shrink-0 gap-2' },
        h('div', { className: 'flex items-center gap-2 min-w-0' },
          h('button', {
            type: 'button',
            onClick: () => setMobileOpen(true),
            className: 'mobile-sidebar-toggle p-2 -ml-1 rounded-md hover:bg-surface-hover text-muted shrink-0'
          }, h(I.menu)),
          h('div', { className: 'text-[13px] font-medium tracking-tight text-foreground/80 truncate' },
            messages.length === 0 ? 'New research' : (messages[0]?.content || '').slice(0, 60)
          )
        ),
        h('div', { className: 'text-[11px] text-muted flex items-center gap-3' },
          lastPdfData && h('button', {
            onClick: () => {
              const d = lastPdfData;
              const url = d.pdf_basename
                ? `/api/reports/${d.pdf_basename.replace('.pdf','.md')}/pdf`
                : d.markdown_basename ? `/api/reports/${d.markdown_basename}` : null;
              if (url) window.open(url, '_blank');
            },
            className: 'text-[11px] text-primary hover:underline'
          }, '⬇ PDF'),
          h('span', { className: 'text-[11px] text-muted' }, 'Engine: LangGraph')
        )
      ),
      h('div', { ref: scrollRef, className: 'flex-1 overflow-y-auto scroll-thin' },
        messages.length === 0
          ? h('div', { className: 'h-full flex items-center justify-center' }, h(EmptyState, { onPick: (q) => setInput(q) }))
          : h('div', { className: 'max-w-3xl mx-auto w-full px-5 py-8 space-y-7' },
              messages.map((m, i) => m.role === 'user'
                ? h(UserMessage, { key: m.id, content: m.content })
                : h(AssistantMessage, {
                    key: m.id,
                    message: m,
                    onRegenerate: m.status === 'complete' ? () => regenerate(i) : undefined
                  })
              )
            )
      ),
      h(InputBar, {
        value: input,
        onChange: setInput,
        onSubmit: () => handleSubmit(),
        onStop: stop,
        isStreaming: streaming,

      })
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
