<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resona — AI Research Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Mode toggle styles ────────────────────────── */
.mode-toggle{display:flex;gap:3px;background:var(--bg2);border-radius:8px;padding:2px;max-width:780px;margin:0 auto 8px}
.mode-btn{flex:1;padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--text3);transition:all .12s;font-family:var(--font)}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.mode-btn:hover:not(.active){background:var(--bg3);color:var(--text)}

/* RAG badge */
.rag-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--accent-glow);color:var(--accent);margin-top:4px}

/* Memory indicator */
.memory-indicator{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.memory-indicator .mi-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.memory-indicator .mi-text{font-size:11px;color:var(--text3)}

/* Sidebar sections */
.sidebar-section{margin-bottom:12px}
.sidebar-section .ss-header{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;cursor:pointer;border-radius:6px;transition:background .12s}
.sidebar-section .ss-header:hover{background:var(--bg3)}
.sidebar-section .ss-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.sidebar-section .ss-count{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:4px;font-family:var(--mono)}
.sidebar-section .ss-body{padding:2px 0;max-height:200px;overflow-y:auto;transition:max-height .2s}
.sidebar-section .ss-body.collapsed{max-height:0;overflow:hidden;padding:0}
.ss-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .12s;font-size:12px;color:var(--text2);margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.ss-item:hover{background:var(--bg3);color:var(--text)}
.ss-item .ssi-icon{flex-shrink:0;font-size:12px;width:18px;text-align:center}
.ss-item .ssi-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ss-item .ssi-date{font-size:9px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.ss-item .ssi-badge{font-size:8px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.ss-item .ssi-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ss-item .ssi-dot.green{background:var(--green)}
.ss-item .ssi-dot.purple{background:var(--purple)}
.ss-empty{padding:12px 12px 8px;font-size:11px;color:var(--text3);text-align:center;font-style:italic}

/* RAG context panel */
.rag-context{margin:12px 0;border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fadeIn .3s ease}
.rag-context .rc-header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:background .12s;border:none;width:100%;text-align:left;font-family:var(--font)}
.rag-context .rc-header:hover{background:var(--bg3)}
.rag-context .rc-header .rc-icon{font-size:14px}
.rag-context .rc-header .rc-label{flex:1}
.rag-context .rc-header .rc-toggle{font-size:10px;color:var(--text3);transition:transform .15s}
.rag-context .rc-header .rc-toggle.open{transform:rotate(90deg)}
.rag-context .rc-body{display:none;padding:10px 14px;max-height:200px;overflow-y:auto;font-size:12px;line-height:1.6;color:var(--text2);background:var(--bg)}
.rag-context .rc-body.open{display:block}
.rag-context .rc-body p{margin:4px 0}
.rag-context .rc-body .rc-source{margin-bottom:8px;padding:6px 8px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--accent)}
.rag-context .rc-body .rc-source .rcs-topic{font-weight:600;color:var(--text)}
.rag-context .rc-body .rc-source .rcs-preview{font-size:11px;margin-top:2px}

/* Mode badge in header */
.mode-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--font)}
.mode-badge.crewai{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple)}
.mode-badge.langchain{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent)}



/* ── Reset & Base ──────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace}
:root[data-theme="dark"]{
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2333; --bg4:#21262d;
  --surface:#161b22; --surface2:#1c2333; --border:#30363d; --border2:#21262d;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --accent:#58a6ff; --accent2:#1f6feb; --accent-glow:rgba(88,166,255,0.12);
  --green:#3fb950; --green-bg:rgba(63,185,80,0.12);
  --yellow:#d29922; --yellow-bg:rgba(210,153,34,0.12);
  --red:#f85149; --red-bg:rgba(248,81,73,0.12);
  --purple:#bc8cff; --purple-bg:rgba(188,140,255,0.12);
  --orange:#db6d28; --orange-bg:rgba(219,109,40,0.12);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 24px rgba(0,0,0,.2);
  --scrollbar:#30363d; --msg-bg:#1c2333; --msg-border:#30363d;
  --input-bg:#161b22; --brand:#bc8cff;
}
:root[data-theme="light"]{
  --bg:#ffffff; --bg2:#f6f8fa; --bg3:#eef1f5; --bg4:#e1e4e8;
  --surface:#ffffff; --surface2:#f6f8fa; --border:#d0d7de; --border2:#e1e4e8;
  --text:#1f2328; --text2:#656d76; --text3:#8b949e;
  --accent:#0969da; --accent2:#0550ae; --accent-glow:rgba(9,105,218,0.08);
  --green:#1a7f37; --green-bg:rgba(26,127,55,0.08);
  --yellow:#9a6700; --yellow-bg:rgba(154,103,0,0.08);
  --red:#cf222e; --red-bg:rgba(207,34,46,0.08);
  --purple:#8250df; --purple-bg:rgba(130,80,223,0.08);
  --orange:#bd5612; --orange-bg:rgba(189,86,18,0.08);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 24px rgba(0,0,0,.04);
  --scrollbar:#d0d7de; --msg-bg:#f6f8fa; --msg-border:#e1e4e8;
  --input-bg:#ffffff; --brand:#8250df;
}
html{font-size:15px;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── App Layout ───────────────────────────────────── */
.app{display:flex;height:100vh}

/* ── Sidebar ──────────────────────────────────────── */
.sidebar{
  width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:10;
}
.sidebar-brand{
  padding:20px 20px 16px;border-bottom:1px solid var(--border);
}
.sidebar-brand .logo-row{display:flex;align-items:center;gap:10px}
.sidebar-brand .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--brand),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700;flex-shrink:0}
.sidebar-brand .logo-text{font-size:20px;font-weight:800;letter-spacing:-.5px}
.sidebar-brand .logo-text span{color:var(--brand)}
.sidebar-brand .tagline{font-size:11px;color:var(--text3);margin-top:2px;margin-left:46px}
.sidebar-nav{padding:12px 10px;flex:1;overflow-y:auto}
.sidebar-nav .label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 10px 6px}
.quick-pill{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  color:var(--text2);cursor:pointer;transition:all .12s;font-size:13px;font-weight:500;
  margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:var(--font);
}
.quick-pill:hover{background:var(--bg3);color:var(--text)}
.quick-pill .qp-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.quick-pill .qp-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-footer{
  padding:14px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);
}
.sidebar-footer .footer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sidebar-footer .badge{display:inline-block;background:var(--bg3);padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono)}

.theme-toggle{display:flex;gap:3px;background:var(--bg2);border-radius:6px;padding:2px;margin-top:10px}
.theme-btn{flex:1;padding:4px 8px;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:var(--text3);transition:all .12s;font-family:var(--font)}
.theme-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08)}

@media(max-width:768px){.sidebar{width:56px}.sidebar-brand .logo-text,.sidebar-brand .tagline,.quick-pill .qp-text,.sidebar-footer,.sidebar-nav .label,.theme-toggle{display:none}.sidebar-brand{padding:12px 8px}.sidebar-nav{padding:8px 4px}.quick-pill{justify-content:center;padding:8px}.sidebar-brand .logo-row{margin:0}.sidebar-brand .logo-icon{width:32px;height:32px;font-size:16px}}

/* ── Main Chat ────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* Chat Header */
.chat-header{
  padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;background:var(--bg);
}
.chat-header .ch-left{display:flex;align-items:center;gap:10px}
.chat-header .ch-title{font-size:15px;font-weight:600}
.chat-header .ch-subtitle{font-size:12px;color:var(--text3)}
.chat-header .ch-actions{display:flex;gap:6px}
.ch-header-btn{
  padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;
  color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;font-family:var(--font);
}
.ch-header-btn:hover{background:var(--bg3);color:var(--text)}

/* Messages Area */
.messages{
  flex:1;overflow-y:auto;padding:20px 0 0;scroll-behavior:smooth;
}
.messages-inner{max-width:780px;margin:0 auto;padding:0 24px}

/* Welcome Screen */
.welcome{text-align:center;padding:60px 20px 40px}
.welcome .w-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--brand),var(--accent));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;color:#fff}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.welcome .w-sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.welcome .w-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:460px;margin:0 auto}
.w-grid-btn{
  padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);
  cursor:pointer;transition:all .15s;text-align:left;font-family:var(--font);
}
.w-grid-btn:hover{border-color:var(--accent);background:var(--accent-glow)}
.w-grid-btn .wgb-icon{font-size:20px;margin-bottom:6px}
.w-grid-btn .wgb-title{font-size:13px;font-weight:600;margin-bottom:2px}
.w-grid-btn .wgb-desc{font-size:11px;color:var(--text3);line-height:1.4}

/* Message Bubbles */
.msg{margin-bottom:16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{
  display:flex;justify-content:flex-end;gap:10px;align-items:flex-start;
}
.msg-user .msg-bubble{
  background:var(--accent);color:#fff;padding:10px 16px;border-radius:16px 16px 4px 16px;
  font-size:14px;line-height:1.5;max-width:75%;word-wrap:break-word;
}
.msg-user .msg-avatar{
  width:30px;height:30px;border-radius:8px;background:var(--accent2);display:flex;
  align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px;
}
.msg-assistant{
  display:flex;gap:10px;align-items:flex-start;
}
.msg-assistant .msg-avatar{
  width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px;
}
.msg-assistant .msg-content{
  flex:1;min-width:0;
}
.msg-assistant .msg-bubble{
  background:var(--msg-bg);border:1px solid var(--msg-border);padding:16px 20px;
  border-radius:12px 12px 12px 4px;font-size:14px;line-height:1.7;word-wrap:break-word;
}
.msg-assistant .msg-bubble h1{font-size:20px;font-weight:700;margin:20px 0 10px;letter-spacing:-.3px}
.msg-assistant .msg-bubble h2{font-size:17px;font-weight:700;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--brand)}
.msg-assistant .msg-bubble h3{font-size:15px;font-weight:600;margin:14px 0 6px}
.msg-assistant .msg-bubble p{margin:8px 0}
.msg-assistant .msg-bubble strong{color:var(--text)}
.msg-assistant .msg-bubble ul,.msg-assistant .msg-bubble ol{padding-left:20px;margin:8px 0}
.msg-assistant .msg-bubble li{margin:4px 0}
.msg-assistant .msg-bubble blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:var(--bg3);border-radius:6px;color:var(--text2);font-style:italic}
.msg-assistant .msg-bubble code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:13px}
.msg-assistant .msg-bubble pre{background:var(--bg3);padding:14px 16px;border-radius:8px;overflow-x:auto;margin:12px 0;border:1px solid var(--border)}
.msg-assistant .msg-bubble pre code{background:none;padding:0;font-size:13px;line-height:1.5}
.msg-assistant .msg-bubble a{color:var(--accent)}
.msg-assistant .msg-bubble hr{margin:16px 0;border:none;border-top:1px solid var(--border)}

/* Thinking indicator */
.thinking-indicator{
  display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;animation:fadeIn .3s ease;
}
.thinking-indicator .ti-avatar{
  width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;
}
.thinking-indicator .ti-content{flex:1;min-width:0}
.thinking-indicator .ti-steps{display:flex;flex-direction:column;gap:6px}
.ti-step{
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);font-size:13px;color:var(--text2);transition:all .2s;
}
.ti-step .ti-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:all .3s}
.ti-step.active{border-color:var(--accent);background:var(--accent-glow);color:var(--text)}
.ti-step.active .ti-dot{background:var(--accent);animation:pulse-dot 1s ease-in-out infinite}
.ti-step.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.ti-step.done .ti-dot{background:var(--green)}
.ti-step.error{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.ti-step.error .ti-dot{background:var(--red)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.ti-step .ti-label{font-weight:500}
.ti-step .ti-status{font-size:11px;color:var(--text3);margin-left:auto}
.ti-step.done .ti-status{color:var(--green)}
.ti-step.active .ti-status{color:var(--accent)}

/* Cursor blink for streaming */
.cursor-blink::after{
  content:'▊';animation:blink 1s step-end infinite;color:var(--accent);font-size:14px;margin-left:2px;
}
@keyframes blink{50%{opacity:0}}

/* PDF Prompt Bar */
.pdf-prompt{
  display:none;align-items:center;gap:12px;padding:14px 20px;margin:16px 0 20px;
  background:linear-gradient(135deg,var(--accent-glow),var(--purple-bg));
  border:1px solid var(--border);border-radius:12px;animation:fadeIn .4s ease;
}
.pdf-prompt.show{display:flex}
.pdf-prompt .pp-icon{font-size:22px;flex-shrink:0}
.pdf-prompt .pp-text{flex:1;min-width:0}
.pdf-prompt .pp-title{font-size:13px;font-weight:600;margin-bottom:2px}
.pdf-prompt .pp-desc{font-size:12px;color:var(--text2)}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;
  border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
  font-family:var(--font);white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:0 0 16px var(--accent-glow)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 12px;font-size:12px}

/* PDF Result overlay (after generating) */
.pdf-result{
  display:none;margin:12px 0 20px;padding:16px 20px;border:1px solid var(--green);
  border-radius:12px;background:var(--green-bg);animation:fadeIn .3s ease;
}
.pdf-result.show{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pdf-result .pr-icon{font-size:20px}
.pdf-result .pr-text{flex:1;min-width:0}
.pdf-result .pr-title{font-weight:600;font-size:14px}
.pdf-result .pr-desc{font-size:12px;color:var(--text2);margin-top:2px}

/* Input Area */
.input-area{
  flex-shrink:0;padding:16px 24px 24px;border-top:1px solid var(--border);background:var(--bg);
}
.input-wrap{
  max-width:780px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;
  background:var(--input-bg);border:1px solid var(--border);border-radius:14px;
  padding:6px;transition:border-color .15s,box-shadow .15s;
}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input-wrap textarea{
  flex:1;border:none;background:transparent;padding:8px 10px;font-size:14px;font-family:var(--font);
  color:var(--text);outline:none;resize:none;min-height:24px;max-height:120px;line-height:1.5;
}
.input-wrap textarea::placeholder{color:var(--text3)}
.input-wrap .send-btn{
  width:38px;height:38px;border-radius:10px;border:none;background:var(--accent);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;
  font-size:16px;flex-shrink:0;
}
.input-wrap .send-btn:hover{background:var(--accent2)}
.input-wrap .send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-wrap .send-btn svg{width:18px;height:18px}
.input-footer{max-width:780px;margin:8px auto 0;font-size:11px;color:var(--text3);text-align:center}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;
  border-radius:10px;background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow);font-size:13px;z-index:1000;display:none;
  animation:slideUp .3s ease;white-space:nowrap;
}
.toast.show{display:flex;align-items:center;gap:8px}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Built with Resona footer */
.built-with{max-width:780px;margin:0 auto;padding:24px 24px 8px;text-align:center;font-size:11px;color:var(--text3)}
.built-with strong{color:var(--brand)}
</style>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ──────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-row">
        <div class="logo-icon">R</div>
        <div class="logo-text">Res<span>o</span>na</div>
      </div>
      <div class="tagline">AI Research Agent</div>

function updateStep(phase, status, message){

  if(status === 'running'){
    statusEl.textContent = message || 'running...';

    if(phase === 'research' && selectedMode === 'langchain' && ragContextLoaded){
      let ragBadge = step.querySelector('.rag-badge');
      if(!ragBadge){
        ragBadge = document.createElement('span');
        ragBadge.className = 'rag-badge';
        ragBadge.textContent = '📚 RAG context loaded';
        step.appendChild(ragBadge);
      }
    }
  } else if(status === 'complete'){
    statusEl.textContent = '✅ done';
  } else if(status === 'error'){
    statusEl.textContent = '❌ failed';
  }
}

// ── Run Agent ──────────────────────────────────────────
async function runAgent(topic){
  console.log('[Resona] runAgent started, mode:', selectedMode);
  isRunning = true;
  sendBtn.disabled = true;

  // Show thinking indicator with mode-aware steps
  addThinkingIndicator(selectedMode);
  document.getElementById('cancelBtn').style.display = 'inline-flex';

  // Prepare for streaming
  let assistantBubble = null;
  let fullContent = '';
  let chunkBuffer = '';
  let pdfData = null;

  try{
    abortController = new AbortController();
    const response = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        topic: topic,
        format: 'markdown+pdf',
        depth: 'standard',
        model: selectedModel,
        mode: selectedMode
      }),
      signal: abortController.signal
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let currentEvent = '';
    let eventCount = 0;

    console.log('[Resona] Starting SSE stream read');
    while(true){
      const {done, value} = await reader.read();
      if(done) {
        console.log('[Resona] SSE stream done, total events processed:', eventCount);
        break;
      }
      buffer += decoder.decode(value, {stream: true});

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for(const line of lines){
        if(line.startsWith('event: ')){
          currentEvent = line.slice(7).trim();
          continue;
        }
        if(line.startsWith('data: ')){
          const rawJson = line.slice(6);
          try{
            const data = JSON.parse(rawJson);
            eventCount++;
            console.log('[Resona] SSE event #' + eventCount + ':', currentEvent, data);
            handleSSEEvent(currentEvent, data);
          }catch(e){
            console.error('[Resona] SSE parse error:', e, 'raw line:', rawJson, 'event:', currentEvent);
          }
        }
      }
    }
  }catch(e){
    if(e.name === 'AbortError'){
      // User cancelled, already handled
    } else {
      showToast('Connection error: ' + e.message, 'error');
    }
  }finally{
    isRunning = false;
    sendBtn.disabled = !input.value.trim();
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function handleSSEEvent(type, data){
    try {
      switch(type){

        case 'phase': {
          const {phase, status, message} = data;
          updateStep(phase, status, message);
          break;
        }

        case 'content_start': {
          console.log('[Resona] content_start — removing thinking indicator, adding assistant bubble');
          removeThinkingIndicator();
          assistantBubble = addAssistantMessage();
          console.log('[Resona] assistantBubble set:', !!assistantBubble);
          // Show RAG context panel if in LangChain mode
          if(selectedMode === 'langchain' && ragContextLoaded){
            const inner = document.getElementById('messagesInner');
            const ragDiv = document.createElement('div');
            ragDiv.className = 'rag-context';
            ragDiv.id = 'ragContextPanel';
            ragDiv.innerHTML = `
              <button class="rc-header" onclick="toggleRagContext()">
                <span class="rc-icon">📚</span>
                <span class="rc-label">RAG context loaded from ChromaDB memory</span>
                <span class="rc-toggle">▶</span>
              </button>
              <div class="rc-body" id="ragContextBody">
                <p>Retrieved relevant context from prior research. The LangChain pipeline is using these past findings to generate a more informed report.</p>
              </div>
            `;
            inner.insertBefore(ragDiv, inner.lastChild);
          }
          break;
        }

        case 'chunk': {
          if(!assistantBubble) {
            console.warn('[Resona] chunk received but no assistantBubble, re-creating');
            removeThinkingIndicator();
            assistantBubble = addAssistantMessage();
          }
          // Remove cursor blink during streaming
          assistantBubble.classList.remove('cursor-blink');
          fullContent += data.text;
          // Render with marked if available
          try{
            assistantBubble.innerHTML = window.marked ? window.marked.parse(fullContent) : fullContent;
          }catch(e){
            console.warn('[Resona] marked parse error:', e);
            assistantBubble.innerHTML = fullContent;
          }
          // Add cursor back
          assistantBubble.classList.add('cursor-blink');
          scrollToBottom();
          break;
        }

        case 'complete': {
          console.log('[Resona] complete event received, fullContent length:', (fullContent || '').length);
          if(assistantBubble){
            assistantBubble.classList.remove('cursor-blink');
            // Add copy button to completed message
            const content = assistantBubble.closest('.msg-content');
            if(content && !content.querySelector('.copy-report-btn')){
              const btnDiv = document.createElement('div');
              btnDiv.style.cssText = 'display:flex;gap:6px;margin-top:8px;padding-left:4px';
              btnDiv.innerHTML = '<button class="btn btn-sm btn-secondary copy-report-btn" onclick="copyReportContent()">📋 Copy Report</button>';
              content.appendChild(btnDiv);
              window._lastReportContent = fullContent;
            }
          } else {
            console.warn('[Resona] complete event but no assistantBubble existed');
          }
          lastPdfData = data;
          // Show PDF prompt
          const prompt = document.getElementById('pdfPrompt');
          if(prompt){
            prompt.classList.add('show');
            prompt.scrollIntoView({behavior:'smooth', block:'center'});
          }
          showToast('✅ Research complete!', 'success');
          // Refresh sidebar data
          loadReportHistory();
          loadMemoryTopics();
          break;
        }

        case 'error': {
          console.error('[Resona] error event:', data.message);
          removeThinkingIndicator();
          // Show error in a message
          const inner = document.getElementById('messagesInner');
          const div = document.createElement('div');
          div.className = 'msg msg-assistant';
          div.innerHTML = `
            <div class="msg-avatar" style="background:var(--red)">✕</div>
            <div class="msg-content">
              <div class="msg-bubble" style="border-color:var(--red);background:var(--red-bg);color:var(--red)">
                <strong>Error:</strong> ${escapeHtml(data.message)}
              </div>
            </div>
          `;
          inner.appendChild(div);
          scrollToBottom();
          showToast('❌ ' + data.message, 'error');
          break;
        }

        default: {
          console.warn('[Resona] unknown SSE event type:', type);
        }
      }
    } catch(e) {
      console.error('[Resona] Error in handleSSEEvent for type', type, ':', e);
    }
  }
}

// ── Cancel research ──────────────────────────────────
function cancelResearch(){
  if(abortController){
    abortController.abort();
    abortController = null;
  }
  isRunning = false;
  sendBtn.disabled = !input.value.trim();
  document.getElementById('cancelBtn').style.display = 'none';
  removeThinkingIndicator();
  showToast('⏹ Research cancelled', 'info');
}

// ── Generate PDF from the research result ──────────────
function generatePdf(){
  const btn = document.getElementById('generatePdfBtn');
  if(!btn || btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';

  const data = lastPdfData;
  if(!data){
    showToast('No research data available. Run a query first.', 'error');
    btn.disabled = false;
    btn.textContent = 'Generate PDF';
    return;
  }

  const mdBasename = data.markdown_basename;
  const pdfBasename = data.pdf_basename;
  const topic = data.topic || 'Report';

  const pdfResult = document.getElementById('pdfResult');
  if(pdfBasename && data.has_pdf){
    pdfResult.innerHTML = `
      <span class="pr-icon">📕</span>
      <div class="pr-text">
        <div class="pr-title">✅ PDF Report Ready</div>
        <div class="pr-desc">${escapeHtml(topic)}</div>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="window.open('/api/reports/${pdfBasename.replace('.pdf','.md')}/pdf','_blank')">⬇ Download PDF</button>
      ${mdBasename ? `<button class="btn btn-sm btn-secondary" onclick="window.open('/api/reports/${mdBasename}','_blank')">⬇ Download MD</button>` : ''}
    `;
  } else if(mdBasename){
    pdfResult.innerHTML = `
      <span class="pr-icon">📄</span>
      <div class="pr-text">
        <div class="pr-title">✅ Markdown Report Ready</div>
        <div class="pr-desc">${escapeHtml(topic)}</div>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="window.open('/api/reports/${mdBasename}','_blank')">⬇ Download MD</button>
    `;
  } else {
    pdfResult.innerHTML = `<div class="pr-text"><div class="pr-title">Report saved on server</div></div>`;
  }
  pdfResult.classList.add('show');
  btn.textContent = '✅ Generated';
  showToast('📕 Report ready for download!', 'success');
}

// ── Toggle RAG context panel ───────────────────────────
function toggleRagContext(){
  const body = document.getElementById('ragContextBody');
  const toggle = document.querySelector('.rag-context .rc-toggle');
  if(body){
    body.classList.toggle('open');
    if(toggle) toggle.classList.toggle('open');
  }
}

// ── Utilities ──────────────────────────────────────────
function escapeHtml(text){
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML.replace(/'/g, '&#39;');
}

function scrollToBottom(){
  const container = document.getElementById('messagesContainer');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function showToast(message, type='info'){
  const toast = document.getElementById('toast');
  toast.className = 'toast show ' + type;
  const icons = {success:'✅', error:'❌', info:'ℹ️', warning:'⚠️'};
  toast.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${message}</span>`;
  clearTimeout(toast._timer);
  toast._timer = setTimeout(()=>toast.classList.remove('show'), 4000);
}
